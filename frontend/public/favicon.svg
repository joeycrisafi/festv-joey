<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background with slight rounding -->
  <rect width="32" height="32" rx="5" fill="#1A1714"/>

  <!-- Gold serif "F" — designed to read sharply at 16px and 32px -->
  <!-- Vertical stem -->
  <rect x="8.5" y="6.5" width="3" height="19" rx="0.5" fill="#C4A06A"/>
  <!-- Top crossbar -->
  <rect x="8.5" y="6.5" width="14" height="3" rx="0.5" fill="#C4A06A"/>
  <!-- Mid crossbar -->
  <rect x="8.5" y="13.5" width="10.5" height="2.5" rx="0.5" fill="#C4A06A"/>
  <!-- Serif foot (bottom of stem) -->
  <rect x="6.5" y="22.5" width="7" height="2" rx="0.5" fill="#C4A06A"/>
  <!-- Serif foot (top of stem, subtle) -->
  <rect x="6.5" y="6.5" width="7" height="1.5" rx="0.5" fill="#C4A06A"/>
</svg>
